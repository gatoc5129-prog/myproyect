<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Jardín de Niños</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#A9D8EE;
    font-family:Arial, sans-serif;
}

/* Encabezado */
header{
    background:#E4C15A;
    padding:25px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

header h1{
    color:#7B2CBF;
    font-size:3rem;
    font-weight:bold;
}

/* Contenido */
.contenido{
    text-align:center;
    margin-top:40px;
}

.contenido h2{
    color:#7B2CBF;
    font-size:3rem;
    margin-bottom:15px;
}

.contenido p{
    color:#333;
    font-size:1.2rem;
    max-width:700px;
    margin:auto;
    line-height:1.6;
}

/* Slider */
.slider{
    width:80%;
    max-width:900px;
    height:450px;
    margin:50px auto 20px;
    overflow:hidden;
    border-radius:25px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.slides{
    display:flex;
    width:600%;
    animation:slide 24s infinite;
}

.slides img{
    width:16.666%;
    height:450px;
    object-fit:cover;
}

/* Descripción */
.descripcion{
    width:80%;
    max-width:900px;
    margin:0 auto 50px;
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:1.1rem;
    color:#333;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    min-height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Animación */
@keyframes slide{
    0%,14%{
        transform:translateX(0%);
    }
    16%,30%{
        transform:translateX(-16.666%);
    }
    32%,46%{
        transform:translateX(-33.333%);
    }
    48%,62%{
        transform:translateX(-50%);
    }
    64%,78%{
        transform:translateX(-66.666%);
    }
    80%,100%{
        transform:translateX(-83.333%);
    }
}

/* Responsive */
@media(max-width:768px){

    header h1{
        font-size:2rem;
    }

    .contenido h2{
        font-size:2rem;
    }

    .slider{
        width:95%;
        height:300px;
    }

    .slides img{
        height:300px;
    }

    .descripcion{
        width:95%;
    }
}
</style>
</head>

<body>

<header>
    <h1>JARDÍN DE NIÑOS KANTUNILKIN</h1>
</header>

<div class="contenido">
    <h2>Aprender, Jugar y Crecer</h2>
    <p>
        Brindamos un ambiente seguro, divertido y educativo donde los niños
        desarrollan sus habilidades mientras disfrutan cada día de aprendizaje.
    </p>
</div>

<div class="slider">
    <div class="slides">
        <img src="../fotos/5.jpg" alt="Imagen 1">
        <img src="../fotos/6.jpg" alt="Imagen 2">
        <img src="../fotos/7.jpg" alt="Imagen 3">
        <img src="../fotos/8.jpg" alt="Imagen 4">
        <img src="../fotos/9.jpg" alt="Imagen 5">
        <img src="../fotos/10.jpg" alt="Imagen 6">
    </div>
</div>

<div class="descripcion" id="descripcion">
    Bienvenidos a nuestro jardín de niños.
</div>

<script>
const descripciones = [
    "Bienvenidos a nuestro jardín de niños. Un espacio lleno de aprendizaje y diversión.",
    
    "Fomentamos la creatividad mediante actividades dinámicas y recreativas.",
    
    "Nuestros alumnos desarrollan habilidades sociales y académicas cada día.",
    
    "Contamos con espacios seguros para el juego y la convivencia.",
    
    "Realizamos eventos especiales para fortalecer la participación de las familias.",
    
    "Nuestro compromiso es formar niños felices, seguros y preparados para el futuro."
];

const descripcion = document.getElementById("descripcion");

let indice = 0;

setInterval(() => {
    indice = (indice + 1) % descripciones.length;
    descripcion.textContent = descripciones[indice];
}, 4000);
</script>

</body>
</html>
